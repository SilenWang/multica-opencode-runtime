version: "3.8"

services:
  multica-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multica-runtime
    hostname: multica-runtime
    volumes:
      - ./data/multica_workspaces:/home/ubuntu/multica_workspaces
      - ./data/multica:/home/ubuntu/.multica
      - ./data/opencode:/home/ubuntu/.local/share/opencode
      - ./data/gh:/home/ubuntu/.config/gh
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    devices:
      - /dev/dri:/dev/dri

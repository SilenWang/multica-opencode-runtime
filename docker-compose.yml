version: "3.8"

services:
  multica-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME}
    hostname: ${CONTAINER_NAME}
    env_file:
      - .env
    volumes:
      - ./data/multica_workspaces:/home/ubuntu/multica_workspaces
      - ./data/multica_daemon:/home/ubuntu/.multica
      - ${HOME}/.local/share/opencode/auth.json:/home/ubuntu/.local/share/opencode/auth.json
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    devices:
      - /dev/dri:/dev/dri

version: "3.8"

services:
  multica-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multica-runtime
    volumes:
      - ./data/multica_workspaces:/home/ubuntu/multica_workspaces
      - ${HOME}/.local/share/opencode/auth.json:/home/ubuntu/.local/share/opencode/auth.json
    stdin_open: true
    tty: true
    devices:
      - /dev/dri:/dev/dri

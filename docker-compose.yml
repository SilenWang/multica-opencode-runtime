version: "3.8"

services:
  multica-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multica-runtime
    volumes:
      - ./data/multica_workspaces:/home/multica/multica_workspaces
      - ${HOME}/.opencode:/home/multica/.opencode
    environment:
      - OPENCODE_CONFIG_DIR=/home/multica/.opencode
    stdin_open: true
    tty: true
    devices:
      - /dev/dri:/dev/dri
